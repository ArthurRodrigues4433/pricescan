<!DOCTYPE html>
<html>
<head>
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>Adicionar Produto</h1>
    <p>Status da compra: <strong>{{ compra.get_status_display }}</strong></p>
    <form method="post" enctype="multipart/form-data" style="max-width: 400px; margin: 0 auto 32px auto; background: #fff; padding: 32px 24px 24px 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(44, 62, 80, 0.08);">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; background: #2d3a4b; color: #fff; border: none; padding: 12px 0; border-radius: 6px; font-size: 1.1rem; font-weight: 500; cursor: pointer; transition: background 0.2s;">Salvar</button>
    </form>
    <a href="{% url 'lista_compra' compra.id %}">Ver lista de compras</a>
</body>
</html>
