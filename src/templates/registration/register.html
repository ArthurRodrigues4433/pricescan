<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PriceScan — Criar conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-white">

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="text-center mb-5">
                    <h1 class="fw-bold text-dark mb-1" style="font-size:1.5rem; letter-spacing:-.01em;">PriceScan</h1>
                    <p class="text-muted small mb-0">Controle de compras de feira</p>
                </div>

                <p class="fw-semibold mb-4">Criar nova conta</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label text-muted small">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}"
                            name="{{ field.html_name }}"
                            id="{{ field.id_for_label }}"
                            class="form-control{% if field.errors %} is-invalid{% endif %}"
                            {% if field.value %}value="{{ field.value }}"{% endif %}
                            {% if forloop.first %}autofocus placeholder="seu@email.com"{% endif %}
                            required>
                        {% for error in field.errors %}
                        <div class="invalid-feedback">{{ error }}</div>
                        {% endfor %}
                        {% if field.help_text and not field.errors %}
                        <div class="form-text text-muted" style="font-size:.75rem;">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark">Criar conta</button>
                    </div>
                </form>

                <hr class="my-4">
                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-outline-dark">Já tenho conta</a>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
