<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PriceScan — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-white">

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="text-center mb-5">
                    <h1 class="fw-bold text-dark mb-1" style="font-size:1.5rem; letter-spacing:-.01em;">PriceScan</h1>
                    <p class="text-muted small mb-0">Controle de compras de feira</p>
                </div>

                <p class="fw-semibold mb-4">Entrar na sua conta</p>

                {% if form.errors %}
                <div class="alert alert-danger py-2 small border-0 bg-danger bg-opacity-10 text-danger">
                    Usuário ou senha incorretos. Tente novamente.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label text-muted small">Usuário</label>
                        <input type="text" name="username" id="id_username"
                            class="form-control"
                            placeholder="Seu usuário"
                            autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label text-muted small">Senha</label>
                        <input type="password" name="password" id="id_password"
                            class="form-control"
                            placeholder="Sua senha"
                            required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">Entrar</button>
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
