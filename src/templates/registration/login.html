<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PriceScan — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold mb-1">PriceScan</h1>
                    <p class="text-muted">Controle de compras de feira</p>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h5 mb-4">Entrar na sua conta</h2>

                        {% if form.errors %}
                        <div class="alert alert-danger py-2 small">
                            Usuário ou senha incorretos. Tente novamente.
                        </div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label fw-semibold">Usuário</label>
                                <input type="text" name="username" id="id_username"
                                    class="form-control form-control-lg"
                                    placeholder="Seu usuário"
                                    autofocus required>
                            </div>
                            <div class="mb-4">
                                <label for="id_password" class="form-label fw-semibold">Senha</label>
                                <input type="password" name="password" id="id_password"
                                    class="form-control form-control-lg"
                                    placeholder="Sua senha"
                                    required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
